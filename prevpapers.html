<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Previous Papers</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:
radial-gradient(circle at bottom,#0b1d4d,#07122e 60%);
color:white;
padding-bottom:40px;
}

.top{
display:flex;
align-items:center;
gap:20px;
padding:25px;
border-bottom:1px solid rgba(255,255,255,0.08);
}

.back{
font-size:35px;
cursor:pointer;
}

.title{
font-size:24px;
font-weight:bold;
}

.tabs{
display:flex;
margin:25px;
background:#111827;
border-radius:40px;
overflow:hidden;
}

.tab{
flex:1;
padding:18px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.active{
background:#00e5ff;
color:black;
}

.filters{
display:flex;
gap:15px;
padding:0 25px;
}

.filter{
flex:1;
padding:18px;
border-radius:18px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
text-align:center;
font-size:18px;
}

.addbtn{
margin:25px;
width:calc(100% - 50px);
padding:20px;
border:none;
border-radius:30px;
font-size:22px;
font-weight:bold;
background:linear-gradient(to right,#06b6d4,#2563eb);
color:white;
}

.paper{
margin:25px;
padding:25px;
border-radius:25px;
background:rgba(255,255,255,0.05);
display:flex;
justify-content:space-between;
align-items:center;
border:1px solid rgba(255,255,255,0.08);
}

.left{
display:flex;
gap:20px;
align-items:center;
}

.icon{
width:70px;
height:70px;
border-radius:18px;
background:#3b1d33;
display:flex;
justify-content:center;
align-items:center;
font-size:35px;
}

.name{
font-size:28px;
font-weight:bold;
}

.info{
margin-top:8px;
color:#9ca3af;
font-size:18px;
}

.download{
width:70px;
height:70px;
border-radius:50%;
background:#0f3b53;
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
color:#00e5ff;
}

#uploadBox{
display:none;
margin:25px;
padding:25px;
border-radius:25px;
background:rgba(255,255,255,0.05);
}

.input{
width:100%;
padding:18px;
border:none;
border-radius:15px;
margin-bottom:15px;
background:#111827;
color:white;
font-size:18px;
}

.uploadbtn{
width:100%;
padding:20px;
border:none;
border-radius:30px;
background:#00ff88;
color:black;
font-size:22px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="top">

<div class="back"
onclick="goBack()">
←
</div>

<div class="title">
Previous Papers
</div>

</div>

<div class="tabs">

<div class="tab active">
FIND PAPERS
</div>

<div class="tab"
onclick="openUpload()">
UPLOAD NEW
</div>

</div>

<div class="filters">

<div class="filter">
All Sems
</div>

<div class="filter">
All Exams
</div>

<div class="filter">
All Schemes
</div>

</div>

<button
class="addbtn"
onclick="openUpload()">
ADD PAPER
</button>

<div id="uploadBox">

<input
id="subjectInput"
class="input"
placeholder="Subject Name">

<input
id="infoInput"
class="input"
placeholder="Exam Info">

<button
class="uploadbtn"
onclick="savePaper()">
UPLOAD PAPER
</button>

</div>

<div id="papers"></div>

<script>

let data = JSON.parse(
localStorage.getItem("papers")
) || [];

const papers =
document.getElementById("papers");

function loadPapers(){

papers.innerHTML = "";

data.forEach((p,index)=>{

papers.innerHTML += `

<div class="paper">

<div class="left">

<div class="icon">
📄
</div>

<div>

<div class="name">
${p.name}
</div>

<div class="info">
${p.info}
</div>

</div>

</div>

<div class="download"
onclick="deletePaper(${index})">
❌
</div>

</div>

`;

});

}

loadPapers();

function openUpload(){

document
.getElementById("uploadBox")
.style.display = "block";

}

function savePaper(){

let subject =
document
.getElementById("subjectInput")
.value;

let info =
document
.getElementById("infoInput")
.value;

if(!subject || !info){

alert("Fill all fields");
return;

}

data.push({

name:subject,
info:info

});

localStorage.setItem(
"papers",
JSON.stringify(data)
);

loadPapers();

alert("Paper Uploaded");

document
.getElementById("uploadBox")
.style.display = "none";

}

function deletePaper(i){

data.splice(i,1);

localStorage.setItem(
"papers",
JSON.stringify(data)
);

loadPapers();

}

function goBack(){

window.location.href =
"dashboard.html";

}

</script>

</body>
</html>
