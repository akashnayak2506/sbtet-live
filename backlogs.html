<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Backlogs</title>

<style>

body{
background:#07122e;
color:white;
font-family:Arial;
padding:20px;
}

.title{
font-size:35px;
font-weight:bold;
margin-bottom:30px;
}

.card{
background:#111c44;
padding:20px;
border-radius:20px;
margin-bottom:20px;
font-size:24px;
}

.back{
margin-bottom:20px;
font-size:28px;
}

</style>

</head>

<body>

<div class="back"
onclick="goBack()">
← Back
</div>

<div class="title">
Active Backlogs
</div>

<div id="list"></div>

<script>

const data =
JSON.parse(
localStorage.getItem(
"backlogSubjects"
)
) || [];

const list =
document.getElementById(
"list"
);

if(data.length == 0){

list.innerHTML =
"<div class='card'>No Active Backlogs</div>";

}

else{

data.forEach(sub=>{

list.innerHTML += `

<div class="card">
${sub}
</div>

`;

});

}

function goBack(){

window.location.href =
"dashboard.html";

}

</script>

</body>
</html>
