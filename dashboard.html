<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<script src="colleges.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:
radial-gradient(circle at bottom,#0b1d4d,#07122e 60%);
color:white;
padding-bottom:50px;
}

.logo{
padding:25px;
font-size:28px;
font-weight:bold;
background:linear-gradient(to right,#00e5ff,#d946ef);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.logout{
position:absolute;
top:25px;
right:20px;
padding:12px 22px;
border-radius:30px;
border:2px solid #d946ef;
color:#d946ef;
font-size:18px;
}

.topcard{
margin:20px;
padding:25px;
border-radius:30px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
}

.user{
display:block;
}

.avatar{
width:70px;
height:70px;
border-radius:50%;
border:4px solid #00e5ff;
display:flex;
justify-content:center;
align-items:center;
font-size:35px;
margin-bottom:15px;
}

.info{
width:100%;
}

.name{
font-size:38px;
font-weight:bold;
width:100%;
max-width:100%;
line-height:1.3;
word-break:break-word;
}

.pin{
margin-top:8px;
color:#9ca3af;
font-size:18px;
line-height:1.5;
word-break:break-word;
width:100%;
display:block;
}

.stats{
margin-top:25px;
padding:25px;
border-radius:25px;
background:#08122f;
display:flex;
justify-content:space-around;
}

.stat{
text-align:center;
}

.num{
font-size:60px;
font-weight:bold;
}

.sgpa{
color:#00e5ff;
}

.credit{
color:#00ff88;
}

.label{
margin-top:10px;
font-size:22px;
color:#9ca3af;
}

.buttons{
display:flex;
gap:20px;
margin-top:25px;
}

.btn{
flex:1;
padding:35px 20px;
border-radius:25px;
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.08);
text-align:center;
font-size:22px;
}

.card{
margin:20px;
padding:25px;
border-radius:30px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
}

.section-title{
font-size:24px;
font-weight:bold;
margin-bottom:25px;
}

.tools{
display:flex;
gap:15px;
}

.tool{
flex:1;
padding:30px 15px;
border-radius:20px;
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.08);
text-align:center;
font-size:20px;
}

</style>

</head>

<body>

<div class="logo">
SBTET LIVE
</div>

<div class="logout"
onclick="logout()">
LOGOUT
</div>

<div class="topcard">

<div class="user">

<div class="avatar">
👤
</div>

<div class="info">

<div class="name"
id="studentName">
Loading...
</div>

<div class="pin"
id="studentPin">
Loading...
</div>

<div class="pin"
id="collegeName">
Loading college...
</div>

</div>

</div>

<div class="stats">

<div class="stat">

<div class="num sgpa"
id="sgpaValue">
0
</div>

<div class="label">
SGPA
</div>

</div>

<div class="stat">

<div class="num credit"
id="creditsValue">
0
</div>

<div class="label">
CREDITS
</div>

</div>

</div>

<div class="buttons">

<div class="btn"
onclick="openReport()">
📄<br><br>
My Report
</div>

<div class="btn"
onclick="openClass()">
🗒️<br><br>
Class Res
</div>

</div>

</div>

<div class="card">

<div class="section-title">
Student Tools
</div>

<div class="tools">

<div class="tool"
onclick="openPrev()">
📚<br><br>
Prev Papers
</div>

<div class="tool"
onclick="openResume()">
📄<br><br>
Resume Gen
</div>

<div class="tool"
onclick="openSub()">
📊<br><br>
Sub Analysis
</div>

</div>

</div>

<div class="card">

<div class="section-title">
Student Insights
</div>

<div class="tools">

<div class="tool">

📈<br><br>

CGPA

<br><br>

<span
id="cgpaValue"
style="
color:#00e5ff;
font-size:26px
">
0
</span>

</div>

<div class="tool"
onclick="showBacklogs()">

📚<br><br>

Backlogs

<br><br>

<span
id="backlogValue"
style="
color:#ff4d6d;
font-size:26px
">

</span>

</div>

<span
id="backlogValue"
style="
color:#ff4d6d;
font-size:26px
">

</span>

</div>

</div>

<br>

<div class="tools">

<div class="tool">

🎓<br><br>

Credits

<br><br>

<span
id="creditsValue2"
style="
color:#00ff88;
font-size:26px
">
0
</span>

</div>

<div class="tool">

💼<br><br>

Placement

<br><br>

<span style="
color:#ffd166;
font-size:20px
">
Eligible
</span>

</div>

</div>

</div>

<script>

const pin =
localStorage.getItem(
"student_pin"
);

if(pin){

document
.getElementById(
"studentPin"
)
.innerHTML = pin;

fetch(
"http://localhost:5050/api/fullreport",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
pin:pin
})
}
)

.then(r=>r.json())

.then(data=>{

document
.getElementById(
"studentName"
)
.innerHTML =
data.name;

let full =
pin.split("-")[0];

let code =
parseInt(full.slice(2));

let college =
colleges[code] ||
"Unknown College";

document
.getElementById(
"collegeName"
)
.innerHTML =
college;

document
.getElementById(
"creditsValue"
)
.innerHTML =
data.credits || 0;

document
.getElementById(
"creditsValue2"
)
.innerHTML =
data.credits || 0;

let cgpa = 0;

if(data.semesters){

let total = 0;

let count = 0;

data.semesters.forEach(s=>{

if(s.sgpa){

total += parseFloat(s.sgpa);

count++;

}

});

if(count > 0){

cgpa =
(total / count).toFixed(2);

}

}

document
.getElementById(
"cgpaValue"
)
.innerHTML =
cgpa;

let latestSgpa = 0;

if(data.semesters){

data.semesters.forEach(s=>{

if(
s.sgpa &&
parseFloat(s.sgpa) > 0
){

latestSgpa = s.sgpa;

}

});

}

document
.getElementById(
"sgpaValue"
)
.innerHTML =
latestSgpa;

let backlogs = 0;

window.backlogSubjects = [];

if(data.semesters){

data.semesters.forEach(sem=>{

if(sem.subjects){

sem.subjects.forEach(sub=>{

let end =
parseFloat(sub.end) || 0;

if(
sub.end == "AB" ||
(end > 0 && end < 10)
){

backlogs++;

window.backlogSubjects.push(
sub.subject
);

}

});

}

});

}

document
.getElementById(
"backlogValue"
)
.innerHTML =
backlogs;

})

.catch(err=>{

console.log(err);

});

}

function logout(){

window.location.href =
"index.html";

}

function openReport(){

window.location.href =
"report.html";

}

function openClass(){

window.location.href =
"class.html";

}

function openPrev(){

window.location.href =
"prevpapers.html";

}

function openResume(){

window.location.href =
"resume.html";

}

function openSub(){

window.location.href =
"subanalysis.html";

}

function showBacklogs(){

localStorage.setItem(
"backlogSubjects",
JSON.stringify(
window.backlogSubjects
)
);

window.location.href =
"backlogs.html";

}

</script>

</body>
</html>
